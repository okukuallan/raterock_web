<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#152E1F"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="30" height="30" rx="5" fill="none" stroke="#C8963A" stroke-width="0.75" stroke-opacity="0.4"/>
  <!-- Gold top accent bar -->
  <rect x="6" y="5.5" width="20" height="2" rx="1" fill="#C8963A"/>
  <!-- Letter R -->
  <text x="16" y="25" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#C8963A" text-anchor="middle">R</text>
</svg>
